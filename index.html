<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- importante para móviles -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saludo Especial</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff758c,#ffb199);
    overflow:hidden;
    padding:20px;
}

/* tarjeta */
.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    animation:entrada 1s ease;
    max-width:400px;
    width:100%;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    color:#555;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:active{
    transform:scale(0.95);
}

#mensaje{
    margin-top:20px;
    font-size:20px;
    display:none;
}

/* animación entrada */
@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(30px)
    }
    to{
        opacity:1;
        transform:translateY(0)
    }
}

/* corazones */
.corazon{
    position:absolute;
    color:red;
    font-size:24px;
    animation:subir 6s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1
    }
    to{
        transform:translateY(-10vh);
        opacity:0
    }
}

/* ajustes extra para pantallas pequeñas */
@media (max-width:480px){

.card{
    padding:25px;
}

h1{
    font-size:24px;
}

p{
    font-size:16px;
}

button{
    width:100%;
}

}

</style>
</head>

<body>

<div class="card">

<h1>✨ ¡Hola! ✨</h1>
<p>Tengo un saludo especial para ti</p>

<button onclick="mostrar()">Abrir saludo 🎁</button>

<div id="mensaje">
🎉 ¡Te deseo un día increíble lleno de alegría y éxito! 🎉
</div>

</div>

<script>

function mostrar(){
document.getElementById("mensaje").style.display="block";
crearCorazones();
}

function crearCorazones(){

for(let i=0;i<25;i++){

let heart=document.createElement("div");
heart.className="corazon";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*25)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
